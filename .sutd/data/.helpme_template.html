<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0d0d0f" />
        <title>Bashboard Help Center</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --accent: #ff8c30;
                --accent-soft: rgba(255, 140, 48, 0.12);
                --accent-dim: #c96d23;
                --bg: #0d0d0f;
                --bg-elev: #16161a;
                --bg-elev-2: #1f1f24;
                --bg-elev-3: #2a2a31;
                --border: #2a2a31;
                --border-soft: #1e1e23;
                --text: #e6e6ea;
                --text-dim: #a0a0a8;
                --text-muted: #6a6a72;
                --code: #7fc7ff;
                --green: #5fcf80;
                --yellow: #ffce5c;
                --red: #ff6b6b;
                --purple: #c195f5;

                --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
                --radius: 8px;
                --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            }

            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family:
                    "Inter",
                    -apple-system,
                    system-ui,
                    sans-serif;
                font-size: 15px;
                line-height: 1.65;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            body {
                display: flex;
                overflow: hidden;
            }

            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--bg-elev-3);
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #3a3a44;
            }

            .sidebar {
                width: 300px;
                flex-shrink: 0;
                background: var(--bg-elev);
                border-right: 1px solid var(--border);
                overflow-y: auto;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .sidebar-brand {
                padding: 1.5em;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }

            .sidebar-brand .logo {
                display: flex;
                align-items: center;
                gap: 0.7em;
            }

            .sidebar-brand .mark {
                width: 32px;
                height: 32px;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent-dim)
                );
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "JetBrains Mono", monospace;
                font-weight: 700;
                color: var(--bg);
                font-size: 1.1em;
                box-shadow: 0 2px 8px rgba(255, 140, 48, 0.25);
            }

            .sidebar-brand h1 {
                color: var(--text);
                font-size: 1.05em;
                font-weight: 700;
                letter-spacing: -0.01em;
            }

            .sidebar-brand .sub {
                color: var(--text-muted);
                font-size: 0.78em;
                margin-top: 0.15em;
            }

            .search {
                padding: 1em 1.5em;
                border-bottom: 1px solid var(--border-soft);
                flex-shrink: 0;
            }

            .search-wrap {
                position: relative;
            }

            .search-icon {
                position: absolute;
                left: 0.7em;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-size: 0.9em;
                pointer-events: none;
            }

            .search input {
                width: 100%;
                background: var(--bg);
                border: 1px solid var(--border);
                color: var(--text);
                padding: 0.55em 0.75em 0.55em 2.2em;
                border-radius: 6px;
                font-family: inherit;
                font-size: 0.88em;
                transition: border-color var(--transition);
            }

            .search input:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-soft);
            }

            .search input::placeholder {
                color: var(--text-muted);
            }

            .search-shortcut {
                position: absolute;
                right: 0.7em;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-family: "JetBrains Mono", monospace;
                font-size: 0.75em;
                background: var(--bg-elev-2);
                padding: 0.15em 0.4em;
                border-radius: 3px;
                border: 1px solid var(--border);
                pointer-events: none;
            }

            .nav {
                flex: 1;
                overflow-y: auto;
                padding: 0.5em 0 1.5em;
            }

            .section-title {
                padding: 1em 1.5em 0.4em;
                color: var(--text-muted);
                font-size: 0.7em;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                display: flex;
                align-items: center;
                gap: 0.5em;
            }

            .section-title .count {
                margin-left: auto;
                background: var(--bg-elev-2);
                color: var(--text-muted);
                padding: 0.1em 0.5em;
                border-radius: 10px;
                font-size: 0.9em;
                letter-spacing: 0;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: 0.55em;
                padding: 0.45em 1.5em;
                color: var(--text-dim);
                text-decoration: none;
                font-size: 0.91em;
                border-left: 2px solid transparent;
                transition: all var(--transition);
                cursor: pointer;
                user-select: none;
            }

            .nav-item:hover {
                background: var(--bg-elev-2);
                color: var(--text);
            }

            .nav-item.active {
                background: var(--accent-soft);
                color: var(--accent);
                border-left-color: var(--accent);
            }

            .nav-item .icon {
                width: 1em;
                text-align: center;
                opacity: 0.7;
                font-size: 0.95em;
            }

            .nav-item.active .icon {
                opacity: 1;
            }

            .nav-item .label {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .nav-item .badge {
                background: var(--accent-dim);
                color: var(--bg);
                padding: 0.1em 0.5em;
                border-radius: 3px;
                font-size: 0.65em;
                font-weight: 700;
                letter-spacing: 0.04em;
            }

            .empty-search {
                padding: 2em 1.5em;
                text-align: center;
                color: var(--text-muted);
                font-size: 0.9em;
            }

            .main {
                flex: 1;
                overflow-y: auto;
                height: 100vh;
                position: relative;
            }

            .topbar {
                position: sticky;
                top: 0;
                background: rgba(13, 13, 15, 0.85);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-bottom: 1px solid var(--border-soft);
                padding: 0.8em 2em;
                z-index: 10;
                display: flex;
                align-items: center;
                gap: 1em;
            }

            .crumbs {
                display: flex;
                align-items: center;
                gap: 0.4em;
                color: var(--text-muted);
                font-size: 0.85em;
                flex: 1;
            }

            .crumbs .sep {
                opacity: 0.5;
            }
            .crumbs .current {
                color: var(--accent);
            }

            .actions {
                display: flex;
                gap: 0.4em;
            }

            .btn {
                background: var(--bg-elev);
                border: 1px solid var(--border);
                color: var(--text-dim);
                padding: 0.35em 0.7em;
                border-radius: 5px;
                font-family: inherit;
                font-size: 0.8em;
                cursor: pointer;
                transition: all var(--transition);
                display: inline-flex;
                align-items: center;
                gap: 0.4em;
            }

            .btn:hover {
                background: var(--bg-elev-2);
                color: var(--text);
                border-color: var(--accent);
            }

            .content {
                max-width: 880px;
                margin: 0 auto;
                padding: 2.5em 2.5em 5em;
            }

            .content h1 {
                color: var(--text);
                font-size: 2.4em;
                font-weight: 700;
                line-height: 1.2;
                margin-bottom: 0.4em;
                letter-spacing: -0.02em;
                border-bottom: 1px solid var(--border);
                padding-bottom: 0.4em;
            }

            .content h2 {
                color: var(--accent);
                font-size: 1.5em;
                font-weight: 600;
                margin: 2em 0 0.7em;
                letter-spacing: -0.01em;
                scroll-margin-top: 5em;
            }

            .content h3 {
                color: var(--text);
                font-size: 1.15em;
                font-weight: 600;
                margin: 1.6em 0 0.5em;
            }

            .content p {
                margin: 0.8em 0;
                color: var(--text-dim);
            }

            .content p.lead {
                font-size: 1.15em;
                color: var(--text);
                margin: 1em 0 1.8em;
                font-weight: 400;
            }

            .content a {
                color: var(--accent);
                text-decoration: none;
                border-bottom: 1px solid transparent;
                transition: border-color var(--transition);
            }

            .content a:hover {
                border-bottom-color: var(--accent);
            }

            .content ul,
            .content ol {
                margin: 0.8em 0 0.8em 1.5em;
            }

            .content li {
                margin: 0.35em 0;
                color: var(--text-dim);
            }

            .content li::marker {
                color: var(--accent);
            }

            .content blockquote {
                border-left: 3px solid var(--accent);
                background: var(--bg-elev);
                padding: 0.8em 1.2em;
                margin: 1.2em 0;
                color: var(--text-dim);
                border-radius: 0 var(--radius) var(--radius) 0;
            }

            .content code {
                background: var(--bg-elev);
                color: var(--code);
                padding: 0.15em 0.45em;
                border-radius: 3px;
                font-family: "JetBrains Mono", Menlo, monospace;
                font-size: 0.85em;
                border: 1px solid var(--border-soft);
            }

            .content pre {
                background: var(--bg-elev);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                margin: 1.2em 0;
                overflow: hidden;
                border-left: 3px solid var(--accent);
                position: relative;
            }

            .content pre code {
                display: block;
                background: transparent;
                padding: 1em 1.2em;
                color: var(--code);
                font-size: 0.85em;
                line-height: 1.6;
                overflow-x: auto;
                border: none;
            }

            .content pre:hover .copy-btn {
                opacity: 1;
            }

            .copy-btn {
                position: absolute;
                top: 0.5em;
                right: 0.5em;
                background: var(--bg-elev-2);
                border: 1px solid var(--border);
                color: var(--text-dim);
                padding: 0.25em 0.55em;
                border-radius: 4px;
                font-family: inherit;
                font-size: 0.7em;
                cursor: pointer;
                opacity: 0;
                transition: all var(--transition);
            }

            .copy-btn:hover {
                background: var(--bg-elev-3);
                color: var(--accent);
            }

            .copy-btn.copied {
                color: var(--green);
                border-color: var(--green);
                opacity: 1;
            }

            .content strong {
                color: var(--text);
                font-weight: 600;
            }
            .content em {
                color: var(--text);
                font-style: italic;
            }

            .content table {
                width: 100%;
                margin: 1.2em 0;
                border-collapse: collapse;
                background: var(--bg-elev);
                border-radius: var(--radius);
                overflow: hidden;
                border: 1px solid var(--border);
            }

            .content th {
                background: var(--bg-elev-2);
                color: var(--accent);
                font-weight: 600;
                text-align: left;
                padding: 0.7em 1em;
                border-bottom: 1px solid var(--border);
                font-size: 0.9em;
            }

            .content td {
                padding: 0.6em 1em;
                border-bottom: 1px solid var(--border-soft);
                color: var(--text-dim);
            }

            .content tr:last-child td {
                border-bottom: none;
            }

            .content hr {
                border: none;
                border-top: 1px solid var(--border);
                margin: 2em 0;
            }

            .welcome {
                padding: 3em 1em;
                text-align: center;
            }

            .welcome-logo {
                color: var(--accent);
                font-family: "JetBrains Mono", monospace;
                font-size: 0.75em;
                white-space: pre;
                line-height: 1.3;
                margin: 0 auto 2em;
                display: inline-block;
                text-align: left;
                opacity: 0.9;
            }

            .welcome h1 {
                border: none;
                font-size: 2.2em;
                margin-bottom: 0.3em;
            }

            .welcome .desc {
                color: var(--text-dim);
                font-size: 1.05em;
                margin-bottom: 2.5em;
                max-width: 500px;
                margin-left: auto;
                margin-right: auto;
            }

            .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 0.9em;
                max-width: 640px;
                margin: 2em auto 3em;
            }

            .stat {
                background: var(--bg-elev);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 1.2em 1em;
                transition: all var(--transition);
                cursor: pointer;
                text-align: left;
            }

            .stat:hover {
                border-color: var(--accent);
                transform: translateY(-2px);
                box-shadow: var(--shadow);
            }

            .stat .top {
                display: flex;
                align-items: center;
                gap: 0.4em;
                margin-bottom: 0.4em;
            }

            .stat .icon {
                font-size: 1.1em;
            }

            .stat .num {
                color: var(--accent);
                font-size: 1.9em;
                font-weight: 700;
                line-height: 1;
                font-family: "JetBrains Mono", monospace;
                letter-spacing: -0.02em;
            }

            .stat .lbl {
                color: var(--text-muted);
                font-size: 0.82em;
                margin-top: 0.2em;
            }

            .shortcuts {
                max-width: 640px;
                margin: 0 auto;
                text-align: left;
                background: var(--bg-elev);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 1.5em;
            }

            .shortcuts h3 {
                color: var(--text);
                margin: 0 0 1em;
                font-size: 0.85em;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-muted);
                font-weight: 600;
            }

            .shortcuts dl {
                display: grid;
                grid-template-columns: max-content 1fr;
                gap: 0.5em 1.2em;
                font-size: 0.9em;
            }

            .shortcuts kbd {
                background: var(--bg);
                border: 1px solid var(--border);
                color: var(--accent);
                padding: 0.15em 0.5em;
                border-radius: 4px;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.85em;
                font-weight: 500;
                display: inline-block;
                min-width: 1.8em;
                text-align: center;
            }

            .shortcuts dd {
                color: var(--text-dim);
            }

            .page-meta {
                display: flex;
                gap: 0.7em;
                align-items: center;
                color: var(--text-muted);
                font-size: 0.82em;
                margin-bottom: 1em;
                flex-wrap: wrap;
            }

            .meta-pill {
                background: var(--bg-elev);
                border: 1px solid var(--border);
                padding: 0.2em 0.6em;
                border-radius: 12px;
                display: inline-flex;
                align-items: center;
                gap: 0.3em;
                font-size: 0.95em;
            }

            .meta-pill.terminal {
                color: var(--purple);
                border-color: rgba(193, 149, 245, 0.3);
            }
            .meta-pill.docs {
                color: var(--code);
                border-color: rgba(127, 199, 255, 0.3);
            }
            .meta-pill.user {
                color: var(--green);
                border-color: rgba(95, 207, 128, 0.3);
            }

            .footer {
                margin-top: 4em;
                padding: 1.5em 2em;
                border-top: 1px solid var(--border);
                color: var(--text-muted);
                font-size: 0.85em;
                text-align: center;
            }

            .footer a {
                color: var(--accent);
                text-decoration: none;
            }

            .footer a:hover {
                text-decoration: underline;
            }

            .mobile-toggle {
                display: none;
                position: fixed;
                bottom: 1.5em;
                right: 1.5em;
                width: 50px;
                height: 50px;
                background: var(--accent);
                color: var(--bg);
                border: none;
                border-radius: 50%;
                font-size: 1.4em;
                cursor: pointer;
                box-shadow: 0 6px 20px rgba(255, 140, 48, 0.4);
                z-index: 100;
                align-items: center;
                justify-content: center;
            }

            @media (max-width: 768px) {
                .sidebar {
                    position: fixed;
                    left: -100%;
                    top: 0;
                    width: 85%;
                    max-width: 320px;
                    z-index: 50;
                    transition: left var(--transition);
                }

                .sidebar.open {
                    left: 0;
                    box-shadow: 8px 0 30px rgba(0, 0, 0, 0.5);
                }

                .mobile-toggle {
                    display: flex;
                }

                .content {
                    padding: 2em 1.5em 5em;
                }
                .welcome {
                    padding: 2em 0.5em;
                }
                .welcome-logo {
                    font-size: 0.55em;
                }
                .content h1 {
                    font-size: 1.7em;
                }
                .content h2 {
                    font-size: 1.25em;
                }
                .topbar {
                    padding: 0.7em 1.2em;
                }
            }

            .fade-in {
                animation: fadeIn 200ms ease-out;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(4px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .ai-warn {
                background: rgba(255, 206, 92, 0.05);
                border: 1px solid rgba(255, 206, 92, 0.25);
                border-left: 3px solid var(--yellow);
                border-radius: var(--radius);
                padding: 0.9em 1.2em;
                margin: 1em 0 2em;
                color: var(--text-dim);
                font-size: 0.88em;
            }

            .ai-warn strong {
                color: var(--yellow);
            }
            .ai-warn a {
                color: var(--accent);
            }
        </style>
    </head>
    <body>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo">
                    <div class="mark">B</div>
                    <div>
                        <h1>Bashboard</h1>
                        <div class="sub">Help Center</div>
                    </div>
                </div>
            </div>

            <div class="search">
                <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input
                        type="text"
                        id="search"
                        placeholder="Search topics..."
                        autocomplete="off"
                    />
                    <span class="search-shortcut">/</span>
                </div>
            </div>

            <nav class="nav" id="nav"></nav>
        </aside>

        <button
            class="mobile-toggle"
            id="mobile-toggle"
            aria-label="Toggle sidebar"
        >
            ☰
        </button>

        <main class="main">
            <div class="topbar">
                <div class="crumbs" id="crumbs">
                    <span>Bashboard</span>
                    <span class="sep">›</span>
                    <span class="current" id="current-crumb">Home</span>
                </div>
                <div class="actions">
                    <button class="btn" id="refresh-btn" title="Refresh">
                        ⟲ refresh
                    </button>
                    <button class="btn" id="theme-btn" title="Toggle theme">
                        ◐
                    </button>
                </div>
            </div>

            <div class="content" id="content"></div>

            <div class="footer">
                Served from <code>__HOSTNAME__</code> on <code>__DATE__</code> ·
                <a href="https://github.com/imsudoer/bashboard" target="_blank"
                    >github.com/imsudoer/bashboard</a
                >
            </div>
        </main>

        <script>
            const TOPICS = __TOPICS_JSON__;

            const TYPE_META = {
                docs: { icon: "📄", label: "Documentation" },
                terminal: { icon: "⚡", label: "Terminal Commands" },
                user: { icon: "📝", label: "User Notes" },
            };

            const TYPE_ORDER = ["docs", "terminal", "user"];

            let currentSlug = null;
            let currentFilter = "";

            function welcomeHTML() {
                const counts = { docs: 0, terminal: 0, user: 0 };
                TOPICS.forEach(
                    (t) => (counts[t.type] = (counts[t.type] || 0) + 1),
                );

                return `
<div class="welcome fade-in">
    <div class="welcome-logo">  ____        _       _____       
 / __ \\      | |     / ____|      
| |  | |_ __ | |_   | (___   __ _ 
| |  | | '_ \\| | | | |\\___ \\ / _\` |
| |__| | | | | | |_| |____) | (_| |
 \\____/|_| |_|_|\\__, |_____/ \\__, |
                 __/ |          | |
                |___/           |_|</div>
    
    <h1>Welcome to Bashboard Help</h1>
    <p class="desc">Pick a topic from the sidebar or search across all documentation</p>
    
    <div class="ai-warn">
        <strong>⚠ AI-generated documentation</strong> — please verify details against 
        <a href="https://github.com/imsudoer/bashboard" target="_blank">imsudoer/bashboard</a> 
        before relying on critical operations.
    </div>
    
    <div class="stats">
        <div class="stat" data-filter="docs">
            <div class="top"><span class="icon">📄</span></div>
            <div class="num">${counts.docs}</div>
            <div class="lbl">Documentation</div>
        </div>
        <div class="stat" data-filter="terminal">
            <div class="top"><span class="icon">⚡</span></div>
            <div class="num">${counts.terminal}</div>
            <div class="lbl">Terminal Tools</div>
        </div>
        <div class="stat" data-filter="user">
            <div class="top"><span class="icon">📝</span></div>
            <div class="num">${counts.user}</div>
            <div class="lbl">User Notes</div>
        </div>
        <div class="stat" data-filter="all">
            <div class="top"><span class="icon">∑</span></div>
            <div class="num">${TOPICS.length}</div>
            <div class="lbl">Total Pages</div>
        </div>
    </div>
    
    <div class="shortcuts">
        <h3>Keyboard shortcuts</h3>
        <dl>
            <dt><kbd>/</kbd></dt>      <dd>Focus search</dd>
            <dt><kbd>↑</kbd> <kbd>↓</kbd></dt><dd>Navigate results</dd>
            <dt><kbd>Enter</kbd></dt>  <dd>Open selected page</dd>
            <dt><kbd>Esc</kbd></dt>    <dd>Clear search / return home</dd>
            <dt><kbd>g</kbd> <kbd>h</kbd></dt><dd>Go home</dd>
        </dl>
    </div>
</div>`;
            }

            function renderNav(filter = "") {
                const nav = document.getElementById("nav");
                nav.innerHTML = "";

                const filtered = filter
                    ? TOPICS.filter(
                          (t) =>
                              t.slug
                                  .toLowerCase()
                                  .includes(filter.toLowerCase()) ||
                              t.title
                                  .toLowerCase()
                                  .includes(filter.toLowerCase()) ||
                              (t.desc || "")
                                  .toLowerCase()
                                  .includes(filter.toLowerCase()),
                      )
                    : TOPICS;

                if (filtered.length === 0) {
                    nav.innerHTML =
                        '<div class="empty-search">No matches found</div>';
                    return;
                }

                const grouped = {};
                TYPE_ORDER.forEach((t) => (grouped[t] = []));
                filtered.forEach((t) => {
                    if (!grouped[t.type]) grouped[t.type] = [];
                    grouped[t.type].push(t);
                });

                Object.entries(grouped).forEach(([type, list]) => {
                    if (list.length === 0) return;
                    const meta = TYPE_META[type] || { icon: "·", label: type };

                    const title = document.createElement("div");
                    title.className = "section-title";
                    title.innerHTML = `<span>${meta.icon}</span> ${meta.label} <span class="count">${list.length}</span>`;
                    nav.appendChild(title);

                    list.sort((a, b) => (a.order || 999) - (b.order || 999));

                    list.forEach((item) => {
                        const a = document.createElement("a");
                        a.className =
                            "nav-item" +
                            (item.slug === currentSlug ? " active" : "");
                        a.dataset.slug = item.slug;
                        a.innerHTML = `
                <span class="icon">${meta.icon}</span>
                <span class="label">${escapeHtml(item.title)}</span>
                ${item.badge ? `<span class="badge">${escapeHtml(item.badge)}</span>` : ""}
            `;
                        a.addEventListener("click", (e) => {
                            e.preventDefault();
                            showTopic(item.slug);
                            if (window.innerWidth <= 768) {
                                document
                                    .getElementById("sidebar")
                                    .classList.remove("open");
                            }
                        });
                        nav.appendChild(a);
                    });
                });
            }

            function escapeHtml(s) {
                return s
                    .replace(/&/g, "&")
                    .replace(/</g, "<")
                    .replace(/>/g, ">");
            }

            function showHome() {
                currentSlug = null;
                document.getElementById("content").innerHTML = welcomeHTML();
                document.getElementById("current-crumb").textContent = "Home";
                document
                    .querySelectorAll(".nav-item")
                    .forEach((n) => n.classList.remove("active"));
                window.history.replaceState(null, "", "#");
                document.querySelector(".main").scrollTop = 0;

                document.querySelectorAll(".stat[data-filter]").forEach((s) => {
                    s.addEventListener("click", () => {
                        const f = s.dataset.filter;
                        const input = document.getElementById("search");
                        if (f === "all") {
                            input.value = "";
                        } else {
                            input.value = "";
                            renderNav("");
                            const firstItem =
                                document.querySelector(`.nav-item[data-slug]`);
                            if (firstItem)
                                firstItem.scrollIntoView({
                                    behavior: "smooth",
                                    block: "center",
                                });
                        }
                        input.focus();
                    });
                });
            }

            function showTopic(slug) {
                const item = TOPICS.find((t) => t.slug === slug);
                if (!item) {
                    showHome();
                    return;
                }

                currentSlug = slug;

                const meta = TYPE_META[item.type] || {
                    icon: "·",
                    label: item.type,
                };

                const html = `
<div class="fade-in">
    <div class="page-meta">
        <span class="meta-pill ${item.type}">${meta.icon} ${meta.label}</span>
        ${item.badge ? `<span class="meta-pill" style="color: var(--accent); border-color: rgba(255,140,48,0.3)">${escapeHtml(item.badge)}</span>` : ""}
        <span style="margin-left: auto; font-family: 'JetBrains Mono', monospace; opacity: 0.7">${escapeHtml(item.slug)}</span>
    </div>
    ${item.html}
</div>`;

                document.getElementById("content").innerHTML = html;
                document.getElementById("current-crumb").textContent =
                    item.title;

                document
                    .querySelectorAll(".nav-item")
                    .forEach((n) =>
                        n.classList.toggle("active", n.dataset.slug === slug),
                    );

                const active = document.querySelector(".nav-item.active");
                if (active) active.scrollIntoView({ block: "nearest" });

                window.history.replaceState(null, "", "#" + slug);
                document.querySelector(".main").scrollTop = 0;

                addCopyButtons();
            }

            function addCopyButtons() {
                document.querySelectorAll(".content pre").forEach((pre) => {
                    if (pre.querySelector(".copy-btn")) return;

                    const btn = document.createElement("button");
                    btn.className = "copy-btn";
                    btn.textContent = "copy";
                    btn.addEventListener("click", () => {
                        const code = pre.querySelector("code");
                        const text = code ? code.textContent : pre.textContent;
                        navigator.clipboard.writeText(text).then(() => {
                            btn.textContent = "✓ copied";
                            btn.classList.add("copied");
                            setTimeout(() => {
                                btn.textContent = "copy";
                                btn.classList.remove("copied");
                            }, 1500);
                        });
                    });
                    pre.appendChild(btn);
                });
            }

            const searchInput = document.getElementById("search");

            searchInput.addEventListener("input", (e) => {
                currentFilter = e.target.value;
                renderNav(currentFilter);
            });

            searchInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    const first = document.querySelector(
                        ".nav-item[data-slug]",
                    );
                    if (first) first.click();
                } else if (e.key === "Escape") {
                    if (searchInput.value) {
                        searchInput.value = "";
                        currentFilter = "";
                        renderNav("");
                    } else {
                        searchInput.blur();
                        showHome();
                    }
                } else if (e.key === "ArrowDown") {
                    e.preventDefault();
                    const first = document.querySelector(
                        ".nav-item[data-slug]",
                    );
                    if (first) first.click();
                }
            });

            let keySeq = [];

            document.addEventListener("keydown", (e) => {
                if (
                    e.target.tagName === "INPUT" ||
                    e.target.tagName === "TEXTAREA"
                )
                    return;

                if (e.key === "/") {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                    return;
                }

                if (e.key === "Escape") {
                    showHome();
                    return;
                }

                if (e.key === "g") {
                    keySeq.push("g");
                    setTimeout(() => {
                        keySeq = [];
                    }, 800);
                    return;
                }

                if (e.key === "h" && keySeq[keySeq.length - 1] === "g") {
                    keySeq = [];
                    showHome();
                    return;
                }

                if (e.key === "ArrowDown" || e.key === "j") {
                    e.preventDefault();
                    navigateList(1);
                }
                if (e.key === "ArrowUp" || e.key === "k") {
                    e.preventDefault();
                    navigateList(-1);
                }
            });

            function navigateList(dir) {
                const items = Array.from(
                    document.querySelectorAll(".nav-item[data-slug]"),
                );
                if (items.length === 0) return;

                const activeIdx = items.findIndex((n) =>
                    n.classList.contains("active"),
                );
                let next = activeIdx + dir;

                if (next < 0) next = items.length - 1;
                if (next >= items.length) next = 0;

                items[next].click();
            }

            document
                .getElementById("refresh-btn")
                .addEventListener("click", () => {
                    location.reload();
                });

            document
                .getElementById("theme-btn")
                .addEventListener("click", () => {
                    document.documentElement.classList.toggle("light");
                });

            document
                .getElementById("mobile-toggle")
                .addEventListener("click", () => {
                    document.getElementById("sidebar").classList.toggle("open");
                });

            function initFromHash() {
                const hash = window.location.hash.slice(1);
                if (hash) {
                    const item = TOPICS.find((t) => t.slug === hash);
                    if (item) {
                        showTopic(hash);
                        return;
                    }
                }
                showHome();
            }

            window.addEventListener("hashchange", initFromHash);

            renderNav();
            initFromHash();
        </script>
    </body>
</html>
